name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Spring Boot backend
        working-directory: taskmanager-backend
        run: mvn -B clean package -DskipTests

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: taskmanager-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: taskmanager-frontend
        run: npm ci

      - name: Build React frontend
        working-directory: taskmanager-frontend
        run: npm run build
        env:
          CI: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker build -t taskflow-backend ./taskmanager-backend
          docker build -t taskflow-frontend ./taskmanager-frontend